    <path d="M -15 -50 L 15 -50 L 15 -15 L 50 -15 L 50 15 L 15 15 L 15 50 L -15 50 L -15 15 L -50 15 L -50 -15 L -15 -15 Z" 
          fill="#16a34a" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="18" fill="#15803d" text-anchor="middle" font-weight="600">
