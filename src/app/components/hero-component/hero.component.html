<section id="home" class="bg-white overflow-hidden" style="padding-top: 68px;">
  <div class="container-custom py-10 lg:py-14">
    <!-- Hero Content -->
    <div class="max-w-3xl mx-auto text-center">
      <!-- Main Headline -->
      <h1 class="font-display font-bold text-neutral-900 leading-tight mb-5" style="font-size: 3rem; line-height: 1.15;">
        Ваше здоров'я — наш
        <span style="color: #33E1AA; display: block;">пріоритет</span>
      </h1>

      <!-- Subtext -->
      <p class="text-base text-neutral-500 mb-8 max-w-xl mx-auto">
        Власне виробництво • Індивідуальне виготовлення • Натуральні препарати
      </p>

      <!-- CTAs -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-14">
        <button
          (click)="navigateToPage('manufacturing')"
          class="btn btn-primary w-full sm:w-auto px-8">
          Індивідуальне виготовлення
        </button>
        <button
          (click)="navigateToPage('about')"
          class="btn btn-outline-primary w-full sm:w-auto px-8">
          Про нас
        </button>
      </div>

      <!-- Trust Badges -->
      <div class="flex flex-wrap items-center justify-center gap-8 text-sm text-neutral-500 mb-14">
        <div class="flex items-center gap-2 flex-col">
          <img class="w-11 h-11" src="../../../assets/dashboard/manufacturing.png" alt="">
          <span>Власне виробництво</span>
        </div>
        <div class="flex items-center gap-2 flex-col">
          <img class="w-11 h-11" src="../../../assets/dashboard/quality.jpg" alt="">
          <span>Контроль якості</span>
        </div>
        <div class="flex items-center gap-2 flex-col">
          <img class="w-11 h-11" src="../../../assets/dashboard/specialist.jpg" alt="">
          <span>Кваліфіковані фармацевти</span>
        </div>
      </div>
    </div>

    <!-- Quick Action Tiles -->
    <div class="max-w-5xl mx-auto">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <button
          (click)="navigateToPage('manufacturing')"
          class="card p-5 text-center hover:border-primary transition-all cursor-pointer group">
          <div class="w-11 h-11 bg-primary-50 rounded flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-100 transition-colors">
            <img src="../../../assets/dashboard/production.jpg" alt="">
          </div>
          <h3 class="font-semibold text-neutral-800 text-sm mb-0.5">Індивідуальне виготовлення</h3>
          <p class="text-xs text-neutral-400">За рецептом</p>
        </button>

        <button
          (click)="navigateToPage('manufacturing')"
          class="card p-5 text-center hover:border-primary transition-all cursor-pointer group">
          <div class="w-11 h-11 bg-primary-50 rounded flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-100 transition-colors">
            <img src="../../../assets/dashboard/catalog.jpg" alt="">
          </div>
          <h3 class="font-semibold text-neutral-800 text-sm mb-0.5">Каталог</h3>
          <p class="text-xs text-neutral-400">Весь асортимент</p>
        </button>

        <button
          (click)="navigateToPage('contacts')"
          class="card p-5 text-center hover:border-primary transition-all cursor-pointer group">
          <div class="w-11 h-11 bg-primary-50 rounded flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-100 transition-colors">
            <img src="../../../assets/dashboard/branches.jpg" alt="">
          </div>
          <h3 class="font-semibold text-neutral-800 text-sm mb-0.5">Наші відділення</h3>
          <p class="text-xs text-neutral-400">3 аптеки</p>
        </button>

        <button
          (click)="navigateToPage('about')"
          class="card p-5 text-center hover:border-primary transition-all cursor-pointer group">
          <div class="w-11 h-11 bg-primary-50 rounded flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-100 transition-colors">
            <img src="../../../assets/dashboard/about.jpg" alt="">
          </div>
          <h3 class="font-semibold text-neutral-800 text-sm mb-0.5">Про нас</h3>
          <p class="text-xs text-neutral-400">Наша історія</p>
        </button>
      </div>
    </div>
  </div>
</section>
