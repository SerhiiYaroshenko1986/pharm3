<section id="home" class="bg-gradient-to-br from-neutral-50 via-white to-primary-50/30 overflow-hidden" style="padding-top:104px">
  <div class="container-custom py-20 lg:py-32">
    <!-- Hero Content -->
    <div class="max-w-4xl mx-auto text-center">
      <!-- Main Headline -->
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-display font-bold text-neutral-900 leading-tight mb-6">
        Your trusted pharmacy,
        <span class="text-primary">delivered.</span>
      </h1>
      
      <!-- Subtext -->
      <p class="text-lg md:text-xl text-neutral-600 leading-relaxed mb-10 max-w-2xl mx-auto">
        Licensed pharmacists • Fast delivery • Easy refills
      </p>
      
      <!-- CTAs -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16">
        <button 
          (click)="navigateToPage('products')"
          class="btn btn-primary text-base px-8 py-4 w-full sm:w-auto">
          Shop now
        </button>
        <button 
          (click)="navigateToPage('prescriptions')"
          class="btn btn-outline-primary text-base px-8 py-4 w-full sm:w-auto">
          Upload prescription
        </button>
      </div>
      
      <!-- Trust Badges -->
      <div class="flex flex-wrap items-center justify-center gap-6 text-sm text-neutral-600 mb-16">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
          </svg>
          <span class="font-medium">Licensed pharmacy</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
          <span class="font-medium">Secure checkout</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span class="font-medium">Pharmacist support</span>
        </div>
      </div>
    </div>

    <!-- Quick Action Tiles -->
    <div class="max-w-6xl mx-auto">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Refill Prescription -->
        <button 
          (click)="navigateToPage('prescriptions')"
          class="card p-6 text-center hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
          <h3 class="font-semibold text-neutral-900 text-sm mb-1">Refill RX</h3>
          <p class="text-xs text-neutral-500">Quick & easy</p>
        </button>

        <!-- Track Order -->
        <button 
          class="card p-6 text-center hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
            </svg>
          </div>
          <h3 class="font-semibold text-neutral-900 text-sm mb-1">Track order</h3>
          <p class="text-xs text-neutral-500">Real-time updates</p>
        </button>

        <!-- Find a Store -->
        <button 
          (click)="navigateToPage('locations')"
          class="card p-6 text-center hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
          </div>
          <h3 class="font-semibold text-neutral-900 text-sm mb-1">Find a store</h3>
          <p class="text-xs text-neutral-500">Near you</p>
        </button>

        <!-- Consultation -->
        <button 
          class="card p-6 text-center hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
          </div>
          <h3 class="font-semibold text-neutral-900 text-sm mb-1">Consultation</h3>
          <p class="text-xs text-neutral-500">Ask pharmacist</p>
        </button>
      </div>
    </div>
  </div>
</section>
