<div class="bg-white border-b border-neutral-200" [style.margin-top]="headerHeight + 'px'">
  <div class="container-custom py-4">
    <div class="relative max-w-2xl mx-auto">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
      <input 
        type="text" 
        [(ngModel)]="searchQuery"
        (keyup.enter)="handleSearch()"
        placeholder="Search for medicines, vitamins, and health products..."
        class="w-full pl-12 pr-4 py-3.5 border border-neutral-300 rounded-button text-neutral-800 placeholder:text-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary transition-all">
      <button 
        *ngIf="searchQuery"
        (click)="searchQuery = ''"
        class="absolute inset-y-0 right-0 pr-4 flex items-center text-neutral-400 hover:text-neutral-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
