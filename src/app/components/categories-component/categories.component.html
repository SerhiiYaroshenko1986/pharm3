    <section id="catalog" class="py-20 bg-neutral-50">
      <div class="container-custom">
        <div class="text-center mb-12">
          <h2 class="text-3xl md:text-4xl font-display font-bold text-neutral-900 mb-3">Shop by category</h2>
          <p class="text-lg text-neutral-600">Find what you need, fast</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
          <button 
            *ngFor="let category of categories" 
            (click)="selectCategory(category)"
            class="card group p-6 text-center hover:scale-[1.02] transition-transform cursor-pointer">
            
            <div class="w-14 h-14 bg-primary-50 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-100 transition-colors">
              <span class="text-2xl">{{category.icon}}</span>
            </div>
            
            <h3 class="font-semibold text-neutral-900 text-sm mb-1 group-hover:text-primary transition-colors">{{category.name}}</h3>
            <p class="text-xs text-neutral-500">{{category.count}} items</p>
          </button>
        </div>

        <div class="text-center mt-10">
          <button 
            (click)="selectCategory(null)"
            class="btn btn-outline-primary">
            View all categories
          </button>
        </div>
      </div>
    </section>
